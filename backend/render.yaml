services:
  - type: web
    name: mobafolio-backend
    runtime: node
    repo: https://github.com/djureta23109563-spec/mobaFolio
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false